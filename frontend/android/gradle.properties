# Project-wide Gradle settings.

# Reduce heap from 1536m to 768m — prevents OOM crash on builds
# Use ParallelGC instead of G1GC (G1 needs more native memory overhead)
org.gradle.jvmargs=-Xmx768m -XX:MaxMetaspaceSize=256m -XX:+UseParallelGC -Dfile.encoding=UTF-8

# Build performance
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.daemon=true

# AndroidX
android.useAndroidX=true

# Disable lint checks that slow down build
android.enableJetifier=false
android.suppressUnsupportedCompileSdk=35
